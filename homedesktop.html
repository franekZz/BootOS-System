<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootiX17 - NewUI Desktop</title>
    <style>
        :root { --accent: #0078d7; --glow: 0 0 20px #0078d7; }
        /* STYL DLA ZHAKOWANEGO SYSTEMU */
        .hacked-mode { --accent: #ff0000 !important; --glow: 0 0 25px #ff0000 !important; }

        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; height: 100vh; transition: 0.5s;
        }

        /* NEONOWY NAPIS W TLE */
        #wallpaper-text {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 120px; font-weight: 900; opacity: 0.15; z-index: 0;
            color: #fff; text-shadow: var(--glow); letter-spacing: 10px; pointer-events: none;
        }

        /* IKONY PULPITU */
        .desktop-icons { padding: 40px; display: flex; flex-direction: column; gap: 25px; z-index: 10; position: relative; }
        .d-icon { width: 90px; text-align: center; cursor: pointer; transition: 0.2s; }
        .d-icon img { width: 55px; display: block; margin: 0 auto 8px; filter: drop-shadow(var(--glow)); }
        .d-icon span { font-size: 12px; text-shadow: 1px 1px 2px #000; }
        .d-icon:hover { transform: scale(1.1); }

        /* PASEK ZADAŃ */
        #taskbar {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            min-width: 450px; height: 60px; background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid var(--accent);
            display: flex; align-items: center; justify-content: center; gap: 20px; z-index: 1000;
        }
        .tb-icon { width: 40px; height: 40px; cursor: pointer; transition: 0.3s; filter: drop-shadow(var(--glow)); }
        .tb-icon:hover { transform: scale(1.2) translateY(-10px); }

        /* ETYKIETA WERSJI */
        #version-info { position: fixed; top: 15px; right: 20px; color: var(--accent); font-weight: bold; font-size: 12px; opacity: 0.6; }
        
        /* EFEKT GLITCH (DLA WIRUSA) */
        .glitch { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(0); } 25% { transform: translate(2px, -2px); } 75% { transform: translate(-2px, 2px); } 100% { transform: translate(0); } }
    </style>
</head>
<body id="desktop-body">

    <div id="wallpaper-text">NewUI</div>
    <div id="version-info">BOOTIX17</div>

    <div class="desktop-icons">
        <div class="d-icon" ondblclick="window.location.href='myfiles.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/10313/10313106.png">
            <span>Moje Pliki</span>
        </div>

        <div id="store-icon" class="d-icon" ondblclick="window.location.href='micrablue_store.html'" style="display:none;">
            <img src="https://cdn-icons-png.flaticon.com/512/9376/9376171.png">
            <span>Store</span>
        </div>

        <div class="d-icon" ondblclick="window.location.href='settingsnew.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/3953/3953226.png">
            <span>Ustawienia</span>
        </div>
    </div>

    <div id="taskbar">
        <img src="https://cdn-icons-png.flaticon.com/512/6213/6213131.png" class="tb-icon" title="Menu Start">
        <img src="https://cdn-icons-png.flaticon.com/512/10313/10313106.png" class="tb-icon" onclick="window.location.href='myfiles.html'">
        <img src="https://cdn-icons-png.flaticon.com/512/9376/9376171.png" class="tb-icon" id="tb-store" onclick="window.location.href='micrablue_store.html'" style="display:none;">
        <img src="https://cdn-icons-png.flaticon.com/512/3953/3953226.png" class="tb-icon" onclick="window.location.href='settingsnew.html'">
    </div>

    <script>
        function initDesktop() {
            // 1. Sprawdzamy wersję i stan hacku
            const version = localStorage.getItem('installedVersion') || "Home";
            const isHacked = localStorage.getItem('systemHacked') === 'true';

            // 2. Ustawiamy tekst wersji
            document.getElementById('version-info').innerText = "BOOTIX17 " + version.toUpperCase();

            // 3. Jeśli wersja to NIE Lite, pokaż sklep
            if (version !== "Lite") {
                document.getElementById('store-icon').style.display = "block";
                document.getElementById('tb-store').style.display = "block";
            }

            // 4. Jeśli zhakowany - zmień kolory na czerwone
            if (isHacked) {
                document.body.classList.add('hacked-mode');
                document.getElementById('wallpaper-text').innerText = "SYSTEM HACKED";
                // Dodajemy efekt glitch do ikon
                document.querySelectorAll('.d-icon').forEach(icon => icon.classList.add('glitch'));
            }
        }

        // Blokada prawego przycisku
        window.oncontextmenu = (e) => e.preventDefault();

        // Start pulpitu
        initDesktop();
    </script>
</body>
</html>

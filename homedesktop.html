<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootiX17 Home - NewUI</title>
    <style>
        :root { --accent: #0078d7; --glow: 0 0 20px #0078d7; --pytonia: #4cc9f0; }
        .hacked-mode { --accent: #ff0000 !important; --glow: 0 0 25px #ff0000 !important; }

        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; height: 100vh; transition: 0.5s;
        }

        #wallpaper-text {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 120px; font-weight: 900; opacity: 0.15; z-index: 0;
            color: #fff; text-shadow: var(--glow); letter-spacing: 10px; pointer-events: none;
        }

        /* MENU START "B" */
        #start-menu {
            display: none; position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%);
            width: 350px; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(25px);
            border: 1px solid var(--accent); border-radius: 15px; z-index: 2000;
            flex-direction: column; padding: 20px; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        .start-item {
            padding: 12px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; border-radius: 8px; transition: 0.2s;
        }
        .start-item:hover { background: rgba(255,255,255,0.1); }
        .start-item img { width: 24px; }

        .power-section {
            margin-top: 20px; padding-top: 15px; border-top: 1px solid #333;
            display: flex; justify-content: space-around;
        }
        .power-btn { font-size: 11px; text-align: center; cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .power-btn:hover { opacity: 1; color: var(--accent); }

        /* OKNA I IKONY (Reszta stylu bez zmian) */
        .window { display: none; position: absolute; top: 100px; left: 200px; width: 600px; height: 400px; background: rgba(10, 10, 10, 0.95); border: 1px solid var(--accent); border-radius: 10px; z-index: 500; flex-direction: column; overflow: hidden; }
        .win-header { background: rgba(255,255,255,0.05); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .win-content { padding: 20px; flex: 1; overflow-y: auto; }
        .desktop-icons { padding: 40px; display: flex; flex-direction: column; gap: 25px; z-index: 10; position: relative; }
        .d-icon { width: 90px; text-align: center; cursor: pointer; }
        .d-icon img { width: 55px; filter: drop-shadow(var(--glow)); }
        
        #taskbar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); min-width: 450px; height: 60px; background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; gap: 20px; z-index: 1000; }
        .tb-icon { width: 40px; cursor: pointer; transition: 0.3s; filter: drop-shadow(var(--glow)); }
    </style>
</head>
<body id="main-body">

    <div id="wallpaper-text">NewUI</div>

    <div id="start-menu">
        <div style="font-weight: bold; margin-bottom: 15px; color: var(--accent);">Wszystkie aplikacje</div>
        <div class="start-item" onclick="toggleStart(); openWin('files-win')">
            <img src="https://cdn-icons-png.flaticon.com/512/10313/10313106.png"> Moje Pliki
        </div>
        <div class="start-item" onclick="toggleStart(); openWin('store-win')">
            <img src="https://cdn-icons-png.flaticon.com/512/9376/9376171.png"> MicraBlue Store
        </div>
        <div class="start-item" onclick="toggleStart(); window.location.href='settingsnew.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/3953/3953226.png"> Ustawienia
        </div>

        <div class="power-section">
            <div class="power-btn" onclick="powerOp('off')">⚪<br>Wyłącz</div>
            <div class="power-btn" onclick="powerOp('restart')">🔄<br>Restart</div>
            <div class="power-btn" onclick="powerOp('bios')">⚙️<br>BIOS</div>
        </div>
    </div>

    <div class="desktop-icons">
        <div class="d-icon" ondblclick="openWin('files-win')"><img src="https://cdn-icons-png.flaticon.com/512/10313/10313106.png"><span>Moje Pliki</span></div>
        <div class="d-icon" ondblclick="openWin('store-win')"><img src="https://cdn-icons-png.flaticon.com/512/9376/9376171.png"><span>Store</span></div>
    </div>

    <div id="files-win" class="window">
        <div class="win-header"><span>Q:\System\Programy\</span><span style="cursor:pointer" onclick="closeWin('files-win')">×</span></div>
        <div class="win-content">
            <div style="display:inline-block; text-align:center; margin:15px; cursor:pointer" onclick="startPytonia()">
                <img src="https://cdn-icons-png.flaticon.com/512/5968/5968350.png" width="45"><br>Pytonia.blue
            </div>
            <div style="display:inline-block; text-align:center; margin:15px; cursor:pointer" onclick="tryVirus()">
                <img src="https://cdn-icons-png.flaticon.com/512/9068/9068695.png" width="45"><br><span style="color:red">wirus.blueq</span>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <div onclick="toggleStart()" style="cursor:pointer; background:var(--accent); width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:900; color:#fff; font-size:24px; box-shadow:var(--glow);">B</div>
        
        <img src="https://cdn-icons-png.flaticon.com/512/10313/10313106.png" class="tb-icon" onclick="openWin('files-win')">
        <img src="https://cdn-icons-png.flaticon.com/512/9376/9376171.png" class="tb-icon" onclick="openWin('store-win')">
    </div>

    <script>
        let pyActive = false;

        function toggleStart() {
            const menu = document.getElementById('start-menu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function openWin(id) { document.getElementById(id).style.display = 'flex'; }
        function closeWin(id) { document.getElementById(id).style.display = 'none'; }

        function startPytonia() {
            pyActive = true; alert("Pytonia Runtime załadowany.");
        }

        function tryVirus() {
            if(!pyActive) alert("Uruchom Pytonia.blue najpierw!");
            else {
                localStorage.setItem('systemHacked', 'true');
                location.reload();
            }
        }

        function powerOp(type) {
            if(type === 'off') {
                document.body.style.background = "#000";
                document.body.innerHTML = "";
            } else if(type === 'restart') {
                window.location.href = "bootix17_install.html";
            } else if(type === 'bios') {
                window.location.href = "bios.html"; // Zakładam, że tak się nazywa Twój plik z BIOSem
            }
        }

        // Ładowanie stanu
        if(localStorage.getItem('systemHacked') === 'true') {
            document.body.classList.add('hacked-mode');
            document.getElementById('wallpaper-text').innerText = "SYSTEM HACKED";
        }
        localStorage.setItem('installedVersion', 'Home');
    </script>
</body>
</html>

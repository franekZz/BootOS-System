<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootOS - Przygotowywanie</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #status-text { font-size: 28px; font-weight: 300; z-index: 10; text-align: center; transition: opacity 0.5s ease; }
        .bubble { position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.15); border-radius: 50%; animation: rise var(--speed) infinite ease-in; z-index: 1; }
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0; } 50% { opacity: 0.4; } 100% { transform: translateY(-120vh) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <div id="status-text">Inicjalizacja...</div>
    <div id="bg-bubbles"></div>

    <script>
        const textElement = document.getElementById('status-text');

        // FUNKCJA ZMIANY TEKSTU
        function changeText(newText, delay) {
            return new Promise(resolve => {
                setTimeout(() => {
                    textElement.style.opacity = 0;
                    setTimeout(() => {
                        textElement.innerText = newText;
                        textElement.style.opacity = 1;
                        resolve();
                    }, 500);
                }, delay);
            });
        }

        // SEKWENCJA (zgodna z Twoimi czasami)
        async function startLoading() {
            await changeText("Wszystko przygotujemy sami", 100); // 4s
            await changeText("Wszystko Spersonalizujemy dla ciebie", 4000); // 3s
            await changeText("Pobieramy aktulizacje", 3000); // 2s
            
            setTimeout(() => {
                window.location.href = "desktop.html";
            }, 2000);
        }

        startLoading();

        // GENERATOR BĄBELKÓW
        setInterval(() => {
            const b = document.createElement('div');
            const size = Math.random() * 50 + 10 + "px";
            b.className = 'bubble';
            b.style.width = size; b.style.height = size;
            b.style.left = Math.random() * 100 + "vw";
            b.style.setProperty('--speed', Math.random() * 4 + 3 + "s");
            document.getElementById('bg-bubbles').appendChild(b);
            setTimeout(() => b.remove(), 7000);
        }, 200);
    </script>
</body>
</html>

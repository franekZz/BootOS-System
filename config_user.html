<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootOS - Krok 2</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; background-color: #0000CD; color: white; }
        .form-card { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); display: flex; flex-direction: column; gap: 15px; width: 300px; }
        input { padding: 15px; border-radius: 10px; border: none; font-size: 16px; outline: none; }
        button { padding: 15px; border-radius: 10px; border: none; background: white; color: #0000CD; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>KROK 2: Twój Profil</h1>
    <div class="form-card">
        <input type="text" id="nick" placeholder="Nazwa (opcjonalnie)">
        <input type="password" id="pass" placeholder="Hasło (opcjonalnie)">
        <button onclick="saveAndLoad()">ZAPISZ I DALEJ</button>
    </div>

    <script>
        function saveAndLoad() {
            const name = document.getElementById('nick').value;
            localStorage.setItem('bootos_user', name || "Użytkownik");
            localStorage.setItem('bootos_pass', document.getElementById('pass').value);
            localStorage.setItem('bootos_configured', 'true');

            // KLUCZOWY MOMENT: Kierujemy do loading.html
            window.location.href = "loading.html";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BlueOS - Instalator BootiX17</title>
    <style>
        body { background: #004578; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #setup { width: 500px; text-align: center; }
        .progress-bar { width: 100%; height: 5px; background: rgba(255,255,255,0.2); margin: 30px 0; overflow: hidden; }
        .fill { width: 0%; height: 100%; background: #fff; animation: install 10s forwards linear; }
        @keyframes install { to { width: 100%; } }
    </style>
</head>
<body>
    <div id="setup">
        <h1 style="font-weight: 300;">Instalowanie BootiX17</h1>
        <p>Proszę czekać, przygotowujemy Twój nowy pulpit...</p>
        <div class="progress-bar"><div class="fill"></div></div>
        <p id="percent" style="font-size: 14px; opacity: 0.7;">Pobieranie składników: 0%</p>
    </div>

    <script>
        let p = 0;
        const txt = document.getElementById('percent');
        const interval = setInterval(() => {
            p++;
            txt.innerText = "Konfigurowanie systemu Qumix... " + p + "%";
            if(p >= 100) {
                clearInterval(interval);
                alert("Instalacja zakończona sukcesem. Witaj w BootiX17!");
                window.location.href = "pulpit_nowy.html";
            }
        }, 100);
    </script>
</body>
</html>

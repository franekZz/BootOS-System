<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootOS - Pulpit</title>
    <style>
        /* --- STYL PULPITU I TAPETY --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
            /* TAPETA CZARNO-NIEBIESKA */
            background: radial-gradient(circle at center, #001a4d 0%, #000000 100%);
            color: white;
        }

        /* NAPIS BOOTOS NA ŚRODKU TAPETY */
        #wallpaper-logo {
            position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(50px, 10vw, 120px);
            font-weight: bold; letter-spacing: 15px;
            opacity: 0.1; user-select: none; pointer-events: none;
        }

        /* --- PASEK ZADAŃ --- */
        #taskbar {
            position: absolute; bottom: 0; width: 100%; height: 45px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; padding: 0 15px;
            box-sizing: border-box; z-index: 1000;
        }

        #start-btn { font-weight: bold; margin-right: 20px; cursor: pointer; color: #55ff55; }

        /* IKONA CMD NA PASKU */
        .taskbar-icon {
            width: 32px; height: 32px; background: #111;
            border: 1px solid #444; border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.2s; color: #55ff55; font-family: monospace;
        }
        .taskbar-icon:hover { background: #222; transform: translateY(-2px); }

        #clock { margin-left: auto; font-family: monospace; font-size: 16px; }

        /* --- OKNO SYSTEMOWE (Dla cmd.html) --- */
        #window-container {
            display: none; position: absolute;
            top: 10%; left: 10%; width: 700px; height: 450px;
            background: #000; border: 1px solid #555;
            border-radius: 6px; box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            flex-direction: column; z-index: 500;
        }

        #window-header {
            height: 32px; background: #222; display: flex;
            align-items: center; padding: 0 10px; cursor: move;
            user-select: none; font-size: 13px; color: #ccc;
        }

        #close-btn { margin-left: auto; cursor: pointer; color: #ff5555; font-weight: bold; padding: 0 5px; }

        /* RAMKA WCZYTUJĄCA PLIK CMD.HTML */
        #cmd-frame {
            width: 100%; height: 100%; border: none; background: black;
        }

        /* POWITANIE NA ŚRODKU */
        #welcome-text {
            position: absolute; top: 20%; width: 100%;
            text-align: center; font-size: 32px; font-weight: 300;
            text-shadow: 0 0 15px rgba(0,100,255,0.5);
        }
    </style>
</head>
<body>

    <div id="wallpaper-logo">BootOS</div>
    <div id="welcome-text">Witaj, <span id="user-name">Użytkownik</span></div>

    <div id="window-container">
        <div id="window-header" id="drag-handle">
            <span>C:\Windows\System32\cmd.exe</span>
            <div id="close-btn" onclick="toggleCMD()">X</div>
        </div>
        <iframe src="cmd.html" id="cmd-frame"></iframe>
    </div>

    <div id="taskbar">
        <div id="start-btn">START</div>
        <div class="taskbar-icon" onclick="toggleCMD()" title="Wiersz Polecenia">>_</div>
        <div id="clock">00:00:00</div>
    </div>

    <script>
        // 1. DANE I ZEGAR
        window.onload = function() {
            const nick = localStorage.getItem('bootos_user') || "Użytkownik";
            document.getElementById('user-name').innerText = nick;

            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString();
            }, 1000);
        };

        // 2. OTWIERANIE / ZAMYKANIE CMD
        function toggleCMD() {
            const win = document.getElementById('window-container');
            if(win.style.display === "flex") {
                win.style.display = "none";
            } else {
                win.style.display = "flex";
            }
        }

        // 3. PRZESUWANIE OKNA (DRAG & DROP)
        const win = document.getElementById('window-container');
        const header = document.getElementById('window-header');
        let isDragging = false, offset = [0,0];

        header.onmousedown = function(e) {
            isDragging = true;
            offset = [win.offsetLeft - e.clientX, win.offsetTop - e.clientY];
        };

        document.onmouseup = function() { isDragging = false; };

        document.onmousemove = function(e) {
            if (isDragging) {
                win.style.left = (e.clientX + offset[0]) + 'px';
                win.style.top = (e.clientY + offset[1]) + 'px';
            }
        };
    </script>
</body>
</html>

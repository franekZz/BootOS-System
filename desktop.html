<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootOS - Pulpit</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #000080 0%, #000000 100%);
            color: white;
        }

        /* LOGO NA ŚRODKU */
        #wallpaper-logo {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            font-size: 120px; font-weight: bold; opacity: 0.1; user-select: none;
        }

        /* PASEK ZADAŃ */
        #taskbar {
            position: absolute; bottom: 0; width: 100%; height: 45px;
            background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 0 10px; z-index: 1000;
        }

        .taskbar-icon {
            width: 35px; height: 35px; background: #222; border: 1px solid #444;
            color: #55ff55; display: flex; justify-content: center; align-items: center;
            border-radius: 5px; cursor: pointer; margin-right: 10px; font-family: monospace;
        }

        /* OKNO SYSTEMOWE (Dla CMD) */
        #window-wrapper {
            display: none; position: absolute; top: 50px; left: 50px;
            width: 700px; height: 450px; background: #333;
            border-radius: 8px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 100; flex-direction: column;
        }

        #window-header {
            height: 35px; background: #222; display: flex; align-items: center;
            padding: 0 15px; cursor: move; user-select: none;
        }

        #window-close { margin-left: auto; color: #ff5555; cursor: pointer; font-weight: bold; }

        /* RAMKA WCZYTUJĄCA CMD.HTML */
        #window-frame { width: 100%; height: 100%; border: none; background: black; }

        #clock { margin-left: auto; font-weight: bold; }
    </style>
</head>
<body>

    <div id="wallpaper-logo">BootOS</div>

    <div id="window-wrapper">
        <div id="window-header">
            <span>Wiersz polecenia (CMD)</span>
            <span id="window-close" onclick="toggleCMD()">X</span>
        </div>
        <iframe src="CMD.html" id="window-frame"></iframe>
    </div>

    <div id="taskbar">
        <div style="margin-right:20px;"><b>START</b></div>
        <div class="taskbar-icon" onclick="toggleCMD()">>_</div>
        <div id="clock">00:00</div>
    </div>

    <script>
        // ZEGAR I DANE
        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
        }, 1000);

        function toggleCMD() {
            const win = document.getElementById('window-wrapper');
            win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        }

        // PRZESUWANIE OKNA
        const wrapper = document.getElementById('window-wrapper');
        const header = document.getElementById('window-header');
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        header.addEventListener("mousedown", (e) => {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
            active = true;
        });

        document.addEventListener("mousemove", (e) => {
            if (active) {
                e.preventDefault();
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
                xOffset = currentX;
                yOffset = currentY;
                wrapper.style.transform = "translate(" + currentX + "px, " + currentY + "px)";
            }
        });

        document.addEventListener("mouseup", () => active = false);
    </script>
</body>
</html>

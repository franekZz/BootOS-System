<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootOS Desktop</title>
    <style>
        body {
            margin: 0; padding: 0; background: #004578; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; background-image: radial-gradient(circle, #005a9e 0%, #004578 100%);
            user-select: none;
        }

        /* IKONY NA PULPITIE */
        .icon-container { display: flex; flex-direction: column; gap: 20px; padding: 20px; }
        .icon { width: 80px; text-align: center; cursor: pointer; color: white; transition: 0.1s; }
        .icon:hover { background: rgba(255,255,255,0.1); }
        .icon img { width: 45px; height: 45px; display: block; margin: 0 auto 5px; }
        .icon span { font-size: 12px; text-shadow: 1px 1px 2px #000; }

        /* PASEK ZADAŃ */
        #taskbar {
            position: fixed; bottom: 0; width: 100%; height: 40px;
            background: #000; display: flex; align-items: center; z-index: 1000;
        }
        #start-btn {
            background: #0078d7; color: white; border: none; height: 100%;
            padding: 0 20px; font-weight: bold; cursor: pointer;
        }
        #start-btn:hover { background: #0086f0; }

        /* MENU START */
        #start-menu {
            display: none; position: fixed; bottom: 40px; left: 0;
            width: 300px; background: #1a1a1a; border: 1px solid #333;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5); z-index: 999;
        }
        .menu-header { padding: 15px; background: #222; border-bottom: 1px solid #333; font-size: 14px; color: #888; }
        .menu-list { padding: 10px 0; }
        .menu-item {
            padding: 10px 20px; color: #fff; cursor: pointer; display: flex; align-items: center;
        }
        .menu-item:hover { background: #0078d7; }
        .menu-item img { width: 20px; height: 20px; margin-right: 15px; }

        /* PODMENU POWER */
        .power-options { border-top: 1px solid #333; margin-top: 10px; }
        .power-item { padding: 10px 20px; color: #ffadad; cursor: pointer; font-size: 13px; }
        .power-item:hover { background: #aa0000; color: #fff; }

        /* NOTYFIKACJA */
        #warning {
            position: fixed; top: 20px; right: 20px; width: 280px;
            background: #fff; color: #000; padding: 15px; border-left: 5px solid #ffcc00;
            font-size: 13px; z-index: 500;
        }
    </style>
</head>
<body>

    <div id="warning">
        <b>BlueOS:</b> Wsparcie BootOS wygasło. 
        <br><a href="settings.html" style="color: #0078d7;">Zaktualizuj do BootiX17</a>
    </div>

    <div class="icon-container">
        <div class="icon" onclick="window.location.href='settings.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png">
            <span>Ustawienia</span>
        </div>
        <div class="icon">
            <img src="https://cdn-icons-png.flaticon.com/512/2815/2815428.png">
            <span>Moje Pliki</span>
        </div>
    </div>

    <div id="start-menu">
        <div class="menu-header">BootOS Standard v1.0</div>
        <div class="menu-list">
            <div class="menu-item" onclick="window.location.href='settings.html'">
                <img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png"> Ustawienia systemu
            </div>
            <div class="menu-item">
                <img src="https://cdn-icons-png.flaticon.com/512/2815/2815428.png"> Przeglądarka plików
            </div>
            <div class="menu-item">
                <img src="https://cdn-icons-png.flaticon.com/512/2891/2891491.png"> Kosz
            </div>
        </div>

        <div class="power-options">
            <div class="power-item" onclick="alert('System wyłączony.')">⏻ Wyłącz komputer</div>
            <div class="power-item" onclick="window.location.href='index.html'">⟳ Uruchom ponownie (Desktop)</div>
            <div class="power-item" style="color: yellow;" onclick="window.location.href='bios.html'">⚙ Uruchom do BIOSu</div>
        </div>
    </div>

    <div id="taskbar">
        <button id="start-btn" onclick="toggleStart()">START</button>
        <div style="margin-left: auto; color: #fff; font-size: 12px; padding-right: 15px;" id="clock">12:00</div>
    </div>

    <script>
        function toggleStart() {
            const menu = document.getElementById('start-menu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        // Zamknij menu po kliknięciu w pulpit
        window.onclick = function(event) {
            if (!event.target.matches('#start-btn')) {
                document.getElementById('start-menu').style.display = 'none';
            }
        }

        // Zegar
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>

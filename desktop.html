<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootOS Desktop</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #004578; /* Klasyczny nudny niebieski */
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            background-image: radial-gradient(circle, #005a9e 0%, #004578 100%);
        }

        /* IKONY NA PULPICIE */
        .icon-container {
            display: flex; flex-direction: column; gap: 20px; padding: 20px;
        }

        .icon {
            width: 80px; text-align: center; cursor: pointer; color: white;
            transition: transform 0.1s;
        }
        .icon:hover { transform: scale(1.1); }
        .icon img { width: 50px; height: 50px; display: block; margin: 0 auto 5px; }
        .icon span { font-size: 12px; text-shadow: 1px 1px 2px #000; }

        /* PASEK ZADAŃ */
        #taskbar {
            position: fixed; bottom: 0; width: 100%; height: 40px;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; padding: 0 10px;
        }
        .start-btn {
            background: #0078d7; color: white; padding: 5px 15px;
            font-weight: bold; cursor: pointer; margin-right: 15px; border: none;
        }

        /* POWIADOMIENIE O BRAKU WSPARCIA */
        #support-warning {
            position: fixed; top: 20px; right: 20px; width: 300px;
            background: #fff; color: #000; padding: 15px;
            border-left: 5px solid #ffcc00; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            font-size: 13px; animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="support-warning">
        <b>Uwaga od BlueOS:</b><br>
        Wsparcie dla systemu BootOS wygasło. Twój komputer może być zagrożony. 
        <a href="settings.html" style="color: #0078d7;">Sprawdź aktualizacje.</a>
    </div>

    <div class="icon-container">
        <div class="icon" onclick="window.location.href='settings.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png" alt="Settings">
            <span>Ustawienia</span>
        </div>

        <div class="icon">
            <img src="https://cdn-icons-png.flaticon.com/512/2815/2815428.png" alt="Files">
            <span>Moje Pliki</span>
        </div>

        <div class="icon">
            <img src="https://cdn-icons-png.flaticon.com/512/2891/2891491.png" alt="Trash">
            <span>Kosz</span>
        </div>
    </div>

    <div id="taskbar">
        <button class="start-btn">START</button>
        <span style="color: #666; font-size: 12px; margin-left: auto;">BootOS 1.0 (Build 42)</span>
    </div>

</body>
</html>

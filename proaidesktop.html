<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BlueBoard DesktopProAI</title>
    <style>
        /* POWRÓT DO BIAŁEJ MYSZKI NA PULPICIE */
        * { cursor: default !important; }

        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background: #000; color: #fff; font-family: 'Consolas', monospace;
        }

        /* ZŁOTY NAPIS W ROGU PO AKTUALIZACJI */
        #gold-brand { 
            position: fixed; top: 15px; right: 15px; color: #d4af37; 
            font-weight: 900; font-size: 22px; text-shadow: 0 0 10px #d4af37; display: none; 
        }

        /* IKONY NA PULPICIE */
        .desktop-icons { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .icon { width: 90px; text-align: center; font-size: 12px; }
        .icon img { width: 50px; height: 50px; margin-bottom: 5px; border: 1px solid #333; padding: 5px; background: #111; }
        .icon:hover img { border-color: #00f2ff; box-shadow: 0 0 10px #00f2ff; }

        /* PASEK ZADAŃ */
        #taskbar {
            position: fixed; bottom: 0; width: 100%; height: 45px;
            background: #0a0a0a; border-top: 2px solid #333;
            display: flex; align-items: center; z-index: 1000;
        }
        #start-btn {
            background: #333; color: #fff; border: 1px solid #444; height: 80%;
            padding: 0 25px; font-weight: bold; font-size: 15px; margin-left: 5px;
        }
        #start-btn:hover { background: #444; border-color: #00f2ff; }

        /* MENU START */
        #start-menu {
            position: fixed; bottom: 47px; left: 0; width: 280px;
            background: #0f0f0f; border: 1px solid #333; display: none; flex-direction: column;
            box-shadow: 5px -5px 20px rgba(0,0,0,0.8);
        }
        .start-item {
            padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between;
        }
        .start-item:hover { background: #0078d7; color: #fff; }
        .start-item:hover .arr { animation: moveArr 0.5s infinite; }
        @keyframes moveArr { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(6px); } }

        /* OKNA SYSTEMOWE */
        .window {
            position: absolute; top: 80px; left: 150px; width: 450px; min-height: 320px;
            background: #000; border: 1px solid #00f2ff; display: none; flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,1); z-index: 500;
        }
        .win-header { background: #0078d7; color: #fff; padding: 8px 12px; display: flex; justify-content: space-between; font-weight: bold; }
        .win-close { background: #ff4444; color: #fff; border: 1px solid #000; padding: 0 8px; font-weight: bold; }
        .win-content { padding: 20px; flex: 1; }

        /* SKANER AI */
        #scan-bar-container { width: 100%; height: 10px; background: #111; border: 1px solid #333; margin-top: 10px; }
        #scan-bar { width: 0%; height: 100%; background: #00f2ff; transition: 0.1s; }
        .scan-log { height: 100px; overflow-y: hidden; font-size: 11px; color: #00f2ff; margin-top: 10px; border-top: 1px solid #222; padding-top: 5px; }

        /* GAMESAPP PROGRESS */
        .game-download { display: none; margin-top: 10px; font-size: 12px; color: #00f2ff; }
        .p-bar { width: 100%; height: 8px; background: #222; border: 1px solid #444; margin-top: 5px; }
        .p-fill { width: 0%; height: 100%; background: #00f2ff; }
    </style>
</head>
<body>

    <div id="gold-brand">BlueBOARD PREMIUM</div>

    <div class="desktop-icons">
        <div class="icon" onclick="openWin('ai-win')">
            <img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">
            <span>AI GUARD</span>
        </div>
        <div class="icon" onclick="openWin('games-win')">
            <img src="https://cdn-icons-png.flaticon.com/512/686/686589.png">
            <span>GAMESAPP</span>
        </div>
    </div>

    <div id="ai-win" class="window">
        <div class="win-header"><span>AI ANTIVIRUS SCANNER</span><button class="win-close" onclick="closeWin('ai-win')">X</button></div>
        <div class="win-content">
            <div id="ai-status">STATUS: SYSTEM OCZEKUJE</div>
            <div id="scan-bar-container"><div id="scan-bar"></div></div>
            <button onclick="startAIScan()" style="margin-top:15px; width:100%; padding:10px; background:#111; color:#00f2ff; border:1px solid #00f2ff; font-weight:bold;">URUCHOM SKANOWANIE</button>
            <div id="scan-log" class="scan-log"></div>
        </div>
    </div>

    <div id="games-win" class="window">
        <div class="win-header"><span>GamesApp Store</span><button class="win-close" onclick="closeWin('games-win')">X</button></div>
        <div class="win-content">
            <p>Wybierz grę:</p>
            <div class="start-item" onclick="dlGame('Cyber Quest')">Cyber Quest 2026 <span class="arr">→</span></div>
            <div class="start-item" onclick="dlGame('BlueBoard Racing')">BlueBoard Racing <span class="arr">→</span></div>
            
            <div id="dl-box" class="game-download">
                Instalowanie: <span id="game-name"></span>...
                <div class="p-bar"><div id="p-fill" class="p-fill"></div></div>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <button id="start-btn" onclick="toggleStart()">START</button>
    </div>

    <div id="start-menu">
        <div class="start-item" onclick="openWin('ai-win')">🛡️ AI Antywirus <span class="arr">→</span></div>
        <div class="start-item" onclick="openWin('games-win')">🎮 GamesApp <span class="arr">→</span></div>
        <div class="start-item" onclick="location.href='bios.html'">⚙️ BIOS Setup <span class="arr">→</span></div>
        <div class="start-item" onclick="location.href='index.html'" style="color:#ff4444; border-top:1px solid #333;">🔒 Wyloguj <span class="arr">→</span></div>
    </div>

    <script>
        // Sprawdzanie Złotej Aktualizacji dla tła
        if(localStorage.getItem('isUpdated') === 'true') {
            document.getElementById('gold-brand').style.display = 'block';
            if(localStorage.getItem('selectedTheme') === 'gold') {
                document.body.style.background = "linear-gradient(45deg, #000, #1a1000)";
            }
        }

        function toggleStart() {
            const m = document.getElementById('start-menu');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function openWin(id) {
            document.getElementById(id).style.display = 'flex';
            document.getElementById('start-menu').style.display = 'none';
        }

        function closeWin(id) {
            document.getElementById(id).style.display = 'none';
        }

        function startAIScan() {
            const log = document.getElementById('scan-log');
            const bar = document.getElementById('scan-bar');
            const stat = document.getElementById('ai-status');
            log.innerHTML = "";
            let p = 0;
            stat.innerText = "STATUS: SKANOWANIE...";
            const lines = ["[AI] Skanowanie jądra...", "[AI] Weryfikacja BootiX...", "[AI] Sprawdzanie Qumix...", "[AI] System czysty."];
            let i = 0;
            const iv = setInterval(() => {
                p += 2; bar.style.width = p + "%";
                if(p % 25 === 0 && i < lines.length) {
                    const d = document.createElement('div');
                    d.innerText = lines[i]; log.prepend(d); i++;
                }
                if(p >= 100) { clearInterval(iv); stat.innerText = "100% SECURE"; stat.style.color = "#00ff00"; }
            }, 80);
        }

        function dlGame(name) {
            document.getElementById('dl-box').style.display = 'block';
            document.getElementById('game-name').innerText = name;
            let p = 0;
            const iv = setInterval(() => {
                p += 4; document.getElementById('p-fill').style.width = p + "%";
                if(p >= 100) { clearInterval(iv); alert("Instalacja " + name + " ukończona!"); document.getElementById('dl-box').style.display = 'none'; }
            }, 100);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootOS Terminal</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: black; color: #55ff55;
            font-family: 'Consolas', 'Lucida Console', monospace;
            font-size: 16px; overflow: hidden;
        }
        #terminal { padding: 15px; height: 100%; overflow-y: auto; box-sizing: border-box; }
        .line { margin-bottom: 5px; white-space: pre-wrap; word-break: break-all; }
        .input-area { display: flex; align-items: center; }
        #user-input {
            background: transparent; border: none; color: #55ff55;
            font-family: inherit; font-size: inherit; outline: none;
            flex-grow: 1; margin-left: 5px;
        }
        .prompt { color: #55ff55; font-weight: bold; }
    </style>
</head>
<body onclick="document.getElementById('user-input').focus()">

    <div id="terminal">
        <div id="history">
            <div class="line">BootOS Command Prompt [Wersja 1.1.0]</div>
            <div class="line">Wpisz 'help', aby zobaczyć listę komend.</div>
            <br>
        </div>
        
        <div class="input-area">
            <span class="prompt">C:\Users\<span id="user-display">Użytkownik</span>></span>
            <input type="text" id="user-input" autofocus spellcheck="false">
        </div>
    </div>

    <script>
        const input = document.getElementById('user-input');
        const history = document.getElementById('history');
        const userDisplay = document.getElementById('user-display');
        const terminal = document.getElementById('terminal');

        const savedUser = localStorage.getItem('bootos_user') || "Użytkownik";
        const savedPass = localStorage.getItem('bootos_pass') || "";
        userDisplay.innerText = savedUser;

        let waitingForPass = false;

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const val = input.value.trim();
                
                if (waitingForPass) {
                    checkResetPassword(val);
                } else {
                    addLine(`C:\\Users\\${savedUser}> ${input.value}`);
                    processCommand(val.toLowerCase());
                }
                
                input.value = '';
                terminal.scrollTop = terminal.scrollHeight;
            }
        });

        function addLine(text, color = "#55ff55") {
            const div = document.createElement('div');
            div.className = 'line';
            div.style.color = color;
            div.innerText = text;
            history.appendChild(div);
        }

        function processCommand(cmd) {
            if (cmd === '') return;

            switch(cmd) {
                case 'help':
                    addLine("Dostępne komendy:");
                    addLine("  reset  - Restartuje system (wymaga hasła)");
                    addLine("  cls    - Czyści ekran");
                    addLine("  whoami - Twoja nazwa");
                    addLine("  exit   - Zamknij terminal");
                    break;

                case 'reset':
                    if (savedPass === "") {
                        executeReset();
                    } else {
                        addLine("SYSTEM: Podaj hasło administratora, aby zrestartować:");
                        waitingForPass = true;
                        input.type = "password"; // Ukrywamy wpisywane hasło
                    }
                    break;

                case 'cls':
                    history.innerHTML = '';
                    break;

                case 'whoami':
                    addLine(savedUser);
                    break;

                default:
                    addLine(`Nazwa '${cmd}' nie jest rozpoznawana.`);
                    break;
            }
        }

        function checkResetPassword(pass) {
            if (pass === savedPass) {
                executeReset();
            } else {
                addLine("BŁĄD: Niepoprawne hasło. Reset przerwany.", "#ff5555");
                waitingForPass = false;
                input.type = "text";
            }
        }

        function executeReset() {
            addLine("Restartowanie systemu...", "#ffff55");
            setTimeout(() => {
                // Czyścimy flagę konfiguracji, żeby wrócić do początku (index.html)
                // Jeśli chcesz tylko restartu bez kasowania danych, użyj: window.top.location.href = "index.html";
                window.top.location.href = "index.html";
            }, 2000);
        }
    </script>
</body>
</html>

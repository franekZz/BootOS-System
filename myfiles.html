<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Eksplorator Plików - BootiX17</title>
    <style>
        :root { --neon-blue: #0078d7; --bg: #050505; --virus: #ff4444; --pytonia: #4cc9f0; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width: 220px; background: #0f0f0f; border-right: 1px solid #222; padding: 20px; }
        .nav-link { padding: 10px; cursor: pointer; border-radius: 5px; margin-bottom: 5px; display: block; color: #888; text-decoration: none; }
        .nav-link:hover { background: #1a1a1a; color: #fff; }
        .nav-link.active { background: var(--neon-blue); color: #fff; }

        /* MAIN VIEW */
        #content { flex: 1; padding: 30px; position: relative; }
        #path { background: #111; padding: 10px; border-radius: 5px; border: 1px solid #222; margin-bottom: 25px; font-family: monospace; font-size: 14px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        .item { text-align: center; cursor: pointer; padding: 15px; border-radius: 10px; transition: 0.2s; border: 1px solid transparent; }
        .item:hover { background: rgba(255,255,255,0.05); border-color: #333; }
        .item img { width: 55px; height: 55px; margin-bottom: 10px; }
        .item span { display: block; font-size: 12px; }

        /* KOLORY SPECJALNE */
        .ext-blueq { color: var(--virus); font-weight: bold; }
        .ext-blue { color: var(--pytonia); font-weight: bold; }

        /* OKNO PYTONI */
        #pytonia-terminal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; height: 300px; background: #000; border: 2px solid var(--pytonia);
            box-shadow: 0 0 30px rgba(76, 201, 240, 0.3); z-index: 1000; padding: 20px; font-family: monospace;
        }
        .close-term { float: right; cursor: pointer; color: var(--pytonia); }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3 style="color: var(--neon-blue); font-size: 16px;">Ten Komputer</h3>
        <div class="nav-link">Dysk Lokalny (C:)</div>
        <div class="nav-link active">System Q (Q:)</div>
        <hr style="border: 0; border-top: 1px solid #222; margin: 20px 0;">
        <button onclick="window.location.href='homedesktop.html'" style="width:100%; background:#222; color:#fff; border:0; padding:10px; cursor:pointer;">Pulpit</button>
    </div>

    <div id="content">
        <div id="path">Q:\System\Programy\</div>

        <div class="grid">
            <div class="item" onclick="alert('Tu są pliki wirusa. Użyj Pytonii, aby je odpalić.')">
                <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
                <span>Mój wirus</span>
            </div>

            <div class="item" onclick="startPytonia()">
                <img src="https://cdn-icons-png.flaticon.com/512/5968/5968350.png">
                <span class="ext-blue">Pytonia.blue</span>
            </div>

            <div class="item" onclick="tryRunVirus('wirus.blueq')">
                <img src="https://cdn-icons-png.flaticon.com/512/9068/9068695.png">
                <span class="ext-blueq">wirus.blueq</span>
            </div>
        </div>
    </div>

    <div id="pytonia-terminal">
        <span class="close-term" onclick="closePytonia()">[X]</span>
        <div style="color: var(--pytonia);">Pytonia v1.0.2 - BlueOS Runtime</div>
        <div id="terminal-out" style="margin-top: 15px; color: #fff; font-size: 13px;">
            > System gotowy.<br>
            > Oczekiwanie na plik .blueq...
        </div>
    </div>

    <script>
        let isPytoniaRunning = false;

        function startPytonia() {
            isPytoniaRunning = true;
            document.getElementById('pytonia-terminal').style.display = 'block';
            document.getElementById('terminal-out').innerHTML += "<br>> Interpreter załadowany.";
        }

        function closePytonia() {
            isPytoniaRunning = false;
            document.getElementById('pytonia-terminal').style.display = 'none';
        }

        function tryRunVirus(fileName) {
            if (!isPytoniaRunning) {
                alert("BŁĄD: System nie posiada domyślnej aplikacji dla rozszerzenia .blueq. \n\nZainstaluj lub uruchom środowisko Pytonia.blue");
            } else {
                executeVirus();
            }
        }

        function executeVirus() {
            const out = document.getElementById('terminal-out');
            out.innerHTML += "<br><span style='color:red'>> Uruchamianie: wirus.blueq...</span>";
            out.innerHTML += "<br>> Wstrzykiwanie kodu do Qumix... 100%";
            
            setTimeout(() => {
                // Efekt ataku
                document.body.style.filter = "invert(1) hue-rotate(180deg)";
                document.body.style.transform = "skewX(5deg)";
                
                // Zapisujemy w pamięci, że pulpit ma być zhakowany
                localStorage.setItem('systemHacked', 'true');
                
                setTimeout(() => {
                    alert("WIRUS AKTYWNY: System NewUI został zmodyfikowany.");
                    window.location.href = "homedesktop.html";
                }, 2000);
            }, 1000);
        }
    </script>
</body>
</html>

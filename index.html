<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootiX17 - BIOS Loader</title>
    <style>
        body {
            background: #000; color: #fff; font-family: 'Consolas', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .logo { font-size: 60px; font-weight: 900; color: #0078d7; text-shadow: 0 0 20px #0078d7; margin-bottom: 10px; }
        .version { font-size: 14px; opacity: 0.5; margin-bottom: 50px; }
        
        .menu { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            width: 280px; padding: 15px; border: 1px solid #333; background: transparent;
            color: #ccc; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s; position: relative;
        }
        .btn:hover { border-color: #0078d7; color: #fff; background: rgba(0, 120, 215, 0.1); box-shadow: 0 0 20px rgba(0, 120, 215, 0.2); }
        
        /* Specjalny styl dla Kontynuuj */
        .btn-continue { border-color: #00ff88; color: #00ff88; }
        .btn-continue:hover { border-color: #00ff88; background: rgba(0, 255, 136, 0.1); box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }

        .scanline {
            width: 100%; height: 2px; background: rgba(0, 120, 215, 0.1);
            position: absolute; top: 0; animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="logo">BootiX17</div>
    <div class="version">Build 2026.03.27 - MicraBlue Systems</div>

    <div class="menu">
        <button class="btn btn-continue" onclick="window.location.href='login.html'">> Kontynuuj sesję</button>
        
        <button class="btn" onclick="confirmReset()">> Nowa Instalacja</button>
        
        <button class="btn" onclick="window.location.href='bios.html'">> BIOS Setup (DEL)</button>
    </div>

    <script>
        function confirmReset() {
            if(confirm("Czy na pewno chcesz usunąć obecny system i zainstalować go od nowa?")) {
                localStorage.clear();
                window.location.href = 'bootix17_install.html';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootOS Startup</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        
        /* 1. EKRAN ŁADOWANIA (6 sekund) */
        #boot-loader {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; transition: opacity 1s;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #0078d7; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 2. ANIMACJA NAPISU BootOS (Z czarnego na niebieski) */
        #logo-screen {
            display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center;
            background: #000; animation: bgToBlue 2s forwards 0.5s;
        }
        @keyframes bgToBlue { from { background: #000; } to { background: #001a33; } }

        #logo-text {
            font-size: 80px; font-weight: 900; color: #000;
            animation: textToBlue 2s forwards 0.5s; letter-spacing: 5px;
        }
        @keyframes textToBlue { from { color: #000; text-shadow: none; } to { color: #0078d7; text-shadow: 0 0 30px #0078d7; } }

        /* 3. MENU WYBORU */
        .menu-btns { margin-top: 40px; display: flex; gap: 20px; opacity: 0; animation: fadeIn 1s forwards 2.5s; }
        .btn {
            padding: 15px 40px; background: transparent; border: 2px solid #0078d7;
            color: #fff; cursor: pointer; font-size: 18px; border-radius: 5px; transition: 0.3s;
        }
        .btn:hover { background: #0078d7; box-shadow: 0 0 20px #0078d7; }

        /* 4. FORMULARZ LOGOWANIA / WYBORU WERSJI */
        #selection-box {
            display: none; flex-direction: column; align-items: center; gap: 15px;
            opacity: 0; animation: fadeIn 0.5s forwards;
        }
        input, select {
            padding: 12px; width: 250px; background: rgba(255,255,255,0.05);
            border: 1px solid #0078d7; color: #fff; border-radius: 5px; outline: none;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="boot-loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-family: monospace; opacity: 0.5;">BlueBoard Neural Link...</p>
    </div>

    <div id="logo-screen">
        <div id="logo-text">BootOS</div>
        
        <div class="menu-btns" id="main-menu">
            <button class="btn" onclick="startSelection('format')">DALEJ</button>
            <button class="btn" onclick="startSelection('login')">ZALOGUJ</button>
        </div>

        <div id="selection-box">
            <h3 id="form-title">Wybierz System</h3>
            <select id="os-version">
                <option value="bootos">BootOS (Legacy)</option>
                <option value="bootix">BootiX17 (NewUI)</option>
            </select>
            <input type="text" id="username" placeholder="Twoja nazwa">
            <button class="btn" style="width: 100%" onclick="finalAction()">URUCHOM</button>
        </div>
    </div>

    <script>
        let currentMode = '';

        // 1. Czekaj 6 sekund na ładowanie
        setTimeout(() => {
            document.getElementById('boot-loader').style.display = 'none';
            document.getElementById('logo-screen').style.display = 'flex';
        }, 6000);

        // 2. Obsługa BIOSu (DEL/F2) w trakcie ładowania
        window.addEventListener('keydown', (e) => {
            if (e.key === "Delete" || e.key === "F2") {
                window.location.href = 'bios.html';
            }
        });

        // 3. Rozpoczęcie wyboru
        function startSelection(mode) {
            currentMode = mode;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('selection-box').style.display = 'flex';
            
            if(mode === 'format') {
                document.getElementById('form-title').innerText = "Formatuj i instaluj:";
            } else {
                document.getElementById('form-title').innerText = "Logowanie do systemu:";
            }
        }

        // 4. Finalna akcja
        function finalAction() {
            const os = document.getElementById('os-version').value;
            const name = document.getElementById('username').value || "Użytkownik";
            
            localStorage.setItem('userName', name);
            
            if(currentMode === 'format') {
                window.location.href = 'bootix17_install.html';
            } else {
                // Jeśli logowanie, sprawdza czy BootiX czy BootOS
                if(os === 'bootix') {
                    window.location.href = 'homedesktop.html';
                } else {
                    alert("System BootOS jest obecnie niedostępny (Wymaga aktualizacji BlueBoard)");
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootOS - Startup</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; color: white;
            font-family: 'Courier New', monospace; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* CZARNY EKRAN STARTOWY */
        #post-screen {
            display: block; width: 85%; font-size: 20px; line-height: 1.5;
        }

        /* NIEBIESKI EKRAN LOGO (UKRYTY NA START) */
        #boot-layer {
            display: none; flex-direction: column; align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        
        #boot-text { font-size: 100px; font-weight: bold; margin-bottom: 40px; }

        .circle-btn {
            width: 100px; height: 100px; background-color: white;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer;
        }
        .arrow-icon { color: #0000CD; font-size: 50px; }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="post-screen">
        <p>BayOSPAL BIOS v1.0.42</p>
        <p>Copyright (C) 2026, BayOSPAL Corp.</p>
        <br>
        <p>Main Processor : Intel(R) Core(TM) i7-13700K</p>
        <p>Memory Test : 16384MB OK</p>
        <br>
        <p>Detecting Storage Devices...</p>
        <p>SATA Port 0 : SSD 512GB (BootOS Drive)</p>
        <br><br>
        <p class="blink">Press <span style="background:white; color:black; padding:0 5px;">DEL</span> or <span style="background:white; color:black; padding:0 5px;">F1</span> to enter Setup</p>
    </div>

    <div id="boot-layer">
        <div id="boot-text">BootOS</div>
        <div class="circle-btn" onclick="window.location.href='config_theme.html'">
            <span class="arrow-icon">➔</span>
        </div>
    </div>

    <script>
        // FUNKCJA WEJŚCIA DO BIOSU
        function enterBios() {
            window.location.href = "bios.html";
        }

        // NASŁUCHIWANIE KLAWISZY (DEL i F1)
        window.addEventListener('keydown', function(e) {
            // Delete = 'Delete', F1 = 'F1'
            if (e.key === 'Delete' || e.key === 'F1') {
                enterBios();
            }
        });

        // JEŚLI UŻYTKOWNIK NIC NIE KLIKNIE PRZEZ 4 SEKUNDY:
        setTimeout(() => {
            // Przejdź do normalnego ładowania systemu
            document.getElementById('post-screen').style.display = 'none';
            document.body.style.backgroundColor = "#0000CD";
            document.getElementById('boot-layer').style.display = 'flex';
        }, 4000);
    </script>
</body>
</html>

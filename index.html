<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootOS - System Start</title>
    <style>
        /* --- STYL BAZOWY --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black; /* Startujemy od czerni */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            /* To odpowiada za animację koloru z czarnego na niebieski */
            transition: background-color 3s ease-in-out;
        }

        /* --- EKRAN 1: BIOS BayOSPAL --- */
        #post-screen {
            display: block;
            width: 80%;
            font-family: 'Courier New', Courier, monospace;
            font-size: 22px;
        }

        /* --- WARSTWA LOGO I PRZYCISKU --- */
        #boot-layer {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        #boot-text {
            font-size: 100px;
            font-weight: bold;
            margin-bottom: 40px;
            letter-spacing: 5px;
        }

        /* --- STRZAŁKA W BIAŁYM KÓŁKU --- */
        #arrow-wrapper {
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        .circle-btn {
            width: 110px;
            height: 110px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .arrow-icon {
            color: #0000CD; /* Niebieska strzałka */
            font-size: 60px;
            line-height: 0;
        }

        /* Animacja ruchu po najechaniu na kółko */
        .circle-btn:hover {
            animation: moveSide 0.6s infinite alternate ease-in-out;
        }

        @keyframes moveSide {
            from { transform: translateX(-20px); }
            to { transform: translateX(20px); }
        }
    </style>
</head>
<body>

    <div id="post-screen">
        <p style="color: #aaa;">Mainboard: <span style="color: #5555ff;">BayOSPAL</span> Rev 1.0</p>
        <p>Memory Test: 16384MB OK</p>
        <p style="margin-top: 50px;">Press <b style="background: white; color: black; padding: 0 5px;">DEL</b> to enter Setup</p>
    </div>

    <div id="boot-layer">
        <div id="boot-text">BootOS</div>
        
        <div id="arrow-wrapper" onclick="startSetup()">
            <div class="circle-btn">
                <span class="arrow-icon">➔</span>
            </div>
        </div>
    </div>

    <script>
        const post = document.getElementById('post-screen');
        const bootLayer = document.getElementById('boot-layer');
        const arrowWrapper = document.getElementById('arrow-wrapper');

        // --- HARMONOGRAM STARTU ---

        // 1. Po 3 sekundach: Znikają napisy BIOS, pojawia się napis BootOS
        setTimeout(() => {
            post.style.display = 'none';
            bootLayer.style.display = 'flex';
        }, 3000);

        // 2. Po 4 sekundach: Tło zaczyna łagodnie zmieniać się na niebieskie
        setTimeout(() => {
            document.body.style.backgroundColor = "#0000CD";
        }, 4000);

        // 3. Po 6 sekundach: Pojawia się białe kółko ze strzałką
        setTimeout(() => {
            arrowWrapper.style.display = 'block';
            setTimeout(() => {
                arrowWrapper.style.opacity = "1";
            }, 50);
        }, 6000);

        // --- FUNKCJA PRZEJŚCIA ---
        function startSetup() {
            // WAŻNE: Plik z motywami MUSI nazywać się config_theme.html na GitHubie
            window.location.href = "config_theme.html";
        }
    </script>
</body>
</html>

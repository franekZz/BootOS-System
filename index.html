<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootOS / BootiX Loader</title>
    <style>
        /* ŻÓŁTA MYSZKA */
        * { cursor: url('https://cur.cursors-4u.net/others/oth-9/oth814.cur'), default !important; }

        body { margin: 0; background: #000; color: #fff; font-family: 'Consolas', monospace; overflow: hidden; height: 100vh; }
        
        /* ŁADOWANIE */
        #boot-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #ffeb3b; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* LOGO I ANIMACJA TŁA */
        #logo-screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; transition: 2s; }
        #logo-text { font-size: 70px; font-weight: 900; letter-spacing: 5px; }

        /* MENU WYBORU */
        .selection-box { display: none; flex-direction: column; gap: 15px; margin-top: 30px; align-items: center; }
        
        select, input { padding: 10px; width: 250px; background: #222; border: 1px solid #444; color: #fff; font-family: 'Consolas'; }

        /* KLASYCZNY PRZYCISK Z ANIMOWANĄ STRZAŁKĄ */
        .arrow-btn { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px; background: #111; border: 1px solid #ffeb3b; 
            color: #ffeb3b; font-weight: bold; width: 280px; text-decoration: none;
            position: relative; overflow: hidden;
        }
        .arrow-btn:hover { background: #ffeb3b; color: #000; }
        
        /* TA STRZAŁKA, CO SIĘ RUSZA */
        .arrow-icon { 
            font-size: 20px; font-weight: bold; margin-left: 10px;
            transition: transform 0.3s;
        }
        
        /* ANIMACJA NA HOVER */
        .arrow-btn:hover .arrow-icon { 
            animation: arrowMove 0.6s infinite;
        }
        
        @keyframes arrowMove {
            0% { transform: translateX(0); }
            50% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }

    </style>
</head>
<body>

    <div id="boot-loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px;">Inicjalizacja BlueBoard...</p>
    </div>

    <div id="logo-screen">
        <div id="logo-text">BootOS</div>
        
        <div id="initial-btns" style="margin-top: 40px; display: flex; flex-direction: column; gap: 20px;">
            <a href="#" class="arrow-btn" onclick="showForm('format')">
                <span>DALEJ (INSTALACJA)</span> <span class="arrow-icon">→</span>
            </a>
            <a href="#" class="arrow-btn" onclick="showForm('login')">
                <span>ZALOGUJ</span> <span class="arrow-icon">→</span>
            </a>
        </div>

        <div id="selection-box" class="selection-box">
            <h3 id="form-title">Wybierz System</h3>
            <select id="os-choice">
                <option value="bootos">BootOS (Classic Edition)</option>
                <option value="bootix">BootiX17 (Neural Edition)</option>
            </select>
            <input type="text" id="username" placeholder="Podaj nazwę użytkownika">
            <a href="#" class="arrow-btn" onclick="launch()" style="width:100%; box-sizing:border-box;">
                <span>URUCHOM</span> <span class="arrow-icon">→</span>
            </a>
        </div>
    </div>

    <script>
        let mode = '';

        // Czekanie 6 sekund
        setTimeout(() => {
            document.getElementById('boot-loader').style.display = 'none';
            const screen = document.getElementById('logo-screen');
            screen.style.display = 'flex';
            
            // Sprawdzanie motywu z BIOS
            const theme = localStorage.getItem('selectedTheme');
            const isUpdated = localStorage.getItem('isUpdated') === 'true';
            
            if(isUpdated && theme === 'gold') {
                screen.style.background = "radial-gradient(circle, #1a1500 0%, #000 100%)";
                document.getElementById('logo-text').style.color = "#d4af37";
                document.getElementById('logo-text').style.textShadow = "0 0 20px #d4af37";
            } else {
                screen.style.background = "radial-gradient(circle, #001a33 0%, #000 100%)";
                document.getElementById('logo-text').style.color = "#0078d7";
            }
        }, 6000);

        function showForm(m) {
            mode = m;
            document.getElementById('initial-btns').style.display = 'none';
            document.getElementById('selection-box').style.display = 'flex';
            document.getElementById('form-title').innerText = (m === 'format') ? "FORMATUJ I INSTALUJ:" : "ZALOGUJ DO:";
        }

        function launch() {
            const os = document.getElementById('os-choice').value;
            const user = document.getElementById('username').value || "Użytkownik";
            localStorage.setItem('userName', user);

            if(mode === 'format') {
                window.location.href = 'bootix17_install.html?os=' + os;
            } else {
                if(os === 'bootix') window.location.href = 'homedesktop.html';
                else alert("Trwa wczytywanie plików BootOS Legacy...");
            }
        }

        // Wejście do BIOS
        window.addEventListener('keydown', (e) => {
            if (e.key === "Delete" || e.key === "F2") window.location.href = 'bios.html';
        });
    </script>
</body>
</html>

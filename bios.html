<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BIOS Setup</title>
    <style>
        body {
            background-color: #000; color: #ccc;
            font-family: 'Courier New', monospace;
            margin: 0; padding: 0; user-select: none; overflow: hidden;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><path d="M0,0 L0,22 L6,16 L11,26 L15,24 L10,14 L18,14 Z" fill="yellow" stroke="black" stroke-width="2"/></svg>'), auto;
        }
        #header { background: #ccc; color: #000; padding: 2px 20px; font-weight: bold; display: flex; justify-content: space-between; }
        
        /* PASEK ZAKŁADEK - Teraz są dwie */
        #nav { display: flex; background: #333; padding: 0 20px; gap: 5px; }
        .nav-tab { padding: 5px 20px; background: #999; color: #000; font-weight: bold; cursor: pointer; }
        .active { background: #ccc; }

        #main { display: flex; height: calc(100vh - 80px); border: 1px solid #444; margin: 10px; }
        #left { flex: 2; padding: 20px; border-right: 1px solid #444; }
        #right { flex: 1; padding: 20px; color: #00aa00; font-size: 13px; }
        
        .opt { padding: 8px 10px; display: flex; justify-content: space-between; width: 90%; cursor: pointer; }
        .opt:hover { background: #222; color: #fff; }

        .bar-bg { width: 100%; background: #222; border: 1px solid #444; height: 12px; margin-top: 10px; }
        .bar-fill { width: 25%; background: #00aa00; height: 100%; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="header">
        <span>BayOSPAL BIOS Utility</span>
        <span>v2.15</span>
    </div>

    <div id="nav">
        <div class="nav-tab active">Accessibility</div>
        <div class="nav-tab" onclick="window.location.href='update.html'">Update</div>
    </div>

    <div id="main">
        <div id="left">
            <h4 style="color:#fff">Accessibility Settings</h4>
            <hr border="0" style="border-top:1px solid #444">
            <br>
            <div class="opt" onclick="window.location.href='bluescreenpoaktulizacjibiosprzywracaniesystemu.html'">
                <span>Skip Instalacion</span><span>[RUN]</span>
            </div>
            <div class="opt"><span>High Contrast</span><span>[DISABLED]</span></div>
            <div class="opt"><span>Magnifier Tool</span><span>[DISABLED]</span></div>
        </div>

        <div id="right">
            <h4 style="color:#fff">Disk Info</h4>
            <hr border="0" style="border-top:1px solid #444">
            <p>NVMe SSD: 4.0 TB</p>
            <p>Used: 1.0 TB</p>
            <div class="bar-bg"><div class="bar-fill"></div></div>
        </div>
    </div>

    <script>
        // Prawy przycisk - powrót do index
        window.addEventListener('mousedown', (e) => {
            if (e.button === 2) window.location.href = "index.html";
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BootOS - Konfiguracja</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif; background-color: #0000CD; color: white;
        }
        .options { display: flex; gap: 40px; margin-top: 30px; }
        .theme-box {
            width: 200px; height: 200px; border-radius: 20px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 24px; transition: 0.3s; border: 5px solid transparent;
        }
        .theme-box:hover { transform: scale(1.1); border-color: white; }
        .light { background-color: #ffffff; color: #333; }
        .dark { background-color: #222222; color: #ffffff; }
    </style>
</head>
<body>
    <h1>Wybierz motyw BootOS</h1>
    <div class="options">
        <div class="theme-box light" onclick="saveTheme('light')">JASNY</div>
        <div class="theme-box dark" onclick="saveTheme('dark')">CIEMNY</div>
    </div>

    <script>
        function saveTheme(mode) {
            localStorage.setItem('bootos_theme', mode);
            window.location.href = "desktop.html"; // Po wyborze idź do pulpitu
        }
    </script>
</body>
</html>
